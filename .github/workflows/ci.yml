name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: ai_infra
          POSTGRES_PASSWORD: ai_infra
          POSTGRES_DB: ai_infra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_infra -d ai_infra_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ai_infra:ai_infra@127.0.0.1:5432/ai_infra_test
      E2E_DATABASE_URL: postgresql://ai_infra:ai_infra@127.0.0.1:5432/ai_infra_test
      E2E_TEST: "1"
      SEC_USER_AGENT: AI Infra Terminal CI ci@example.com
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Run deterministic research quality gate
        run: |
          pnpm db:migrate
          pnpm db:seed:e2e
          pnpm research:quality -- --gate
      - run: pnpm test:e2e
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
