name: Research ingestion

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: research-ingestion
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply database migrations
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Run evidence, thesis, and briefing pipeline
        if: ${{ env.DATABASE_URL != '' }}
        run: pnpm research:cycle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MEMO_MODEL: gpt-5-mini
          AI_EMBEDDING_MODEL: text-embedding-3-small
      - name: Explain missing configuration
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "Add DATABASE_URL and SEC_USER_AGENT as repository secrets to enable scheduled ingestion."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
