services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ai_infra
      POSTGRES_USER: ai_infra
      POSTGRES_PASSWORD: ai_infra
    ports:
      - "5432:5432"
    volumes:
      - ai-infra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_infra -d ai_infra"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ai-infra-postgres:
